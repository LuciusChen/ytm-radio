name: Helper release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary: ytm-radio-helper
            asset: ytm-radio-helper-aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
            binary: ytm-radio-helper
            asset: ytm-radio-helper-x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: ytm-radio-helper
            asset: ytm-radio-helper-x86_64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: ytm-radio-helper.exe
            asset: ytm-radio-helper-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build helper
        run: cargo build --manifest-path helper/Cargo.toml --release --locked --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          asset="${{ matrix.asset }}"
          cp "helper/target/${{ matrix.target }}/release/${{ matrix.binary }}" "$asset"
          chmod 755 "$asset"

      - name: Upload asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [ -z "$tag" ]; then
            tag="${{ inputs.tag }}"
          fi
          gh release upload "$tag" "${{ matrix.asset }}" --clobber
